services:
  postgres:
    image: postgres:15-alpine
    container_name: wecandoleb-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wecandoleb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - wecandoleb_postgres_data:/var/lib/postgresql/data

volumes:
  wecandoleb_postgres_data:
